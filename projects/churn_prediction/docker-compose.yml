# docker-compose.yml
# Stack para serving + tracking/registry + observabilidade
#
# Serviços:
# - api: FastAPI (carrega modelo do MLflow Registry)
# - postgres: backend store do MLflow
# - minio: storage S3-compatible para artifacts do MLflow
# - mc: init do bucket no MinIO
# - mlflow: tracking server + model registry
# - prometheus: coleta métricas (inclui scrape da API em /metrics)
# - grafana: dashboards
#
# Como usar:
#   docker compose up -d --build
#
# URLs:
#   API:        http://localhost:8000/health
#   MLflow UI:  http://localhost:5000
#   MinIO:      http://localhost:9001
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3000 (admin/admin)

name: churn-stack

networks:
  churn-net:
    driver: bridge

volumes:
  pg_data:
  minio_data:
  prometheus_data:
  grafana_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: churn-postgres
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - churn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: churn-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9100:9000"   # host 9100 -> container 9000 (S3 API)
      - "9101:9001"   # host 9101 -> container 9001 (Console)
    volumes:
      - minio_data:/data
    networks:
      - churn-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30

  mc:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: churn-minio-mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - churn-net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345 &&
      mc mb -p local/mlflow || true &&
      mc anonymous set download local/mlflow || true &&
      echo 'MinIO bucket ready'"

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: churn-mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc:
        condition: service_completed_successfully
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio12345
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_REGION: us-east-1
      MLFLOW_S3_IGNORE_TLS: "true"
    networks:
      - churn-net
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://mlflow
      --serve-artifacts

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: churn-api
    depends_on:
      mlflow-proxy:
        condition: service_started
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-proxy
      MLFLOW_REGISTRY_URI: http://mlflow-proxy
      CHURN_MODEL_URI: ${CHURN_MODEL_URI:-models:/churn_xgb/1}
      CHURN_THRESHOLD: ${CHURN_THRESHOLD:-0.5}
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio12345
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_REGION: us-east-1
    ports:
      - "8000:8000"
    networks:
      - churn-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 10s
      timeout: 3s
      retries: 20

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: churn-prometheus
    depends_on:
      api:
        condition: service_started
    ports:
      - "9090:9090"
    networks:
      - churn-net
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: churn-grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    networks:
      - churn-net
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro

  mlflow-proxy:
    image: nginx:1.27-alpine
    container_name: churn-mlflow-proxy
    depends_on:
      mlflow:
        condition: service_started
    ports:
      - "5001:80"
    networks:
      - churn-net
    volumes:
      - ./infra/nginx/mlflow.conf:/etc/nginx/conf.d/default.conf:ro
